<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link crossorigin="anonymous" rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
    <title>Access denied</title>
</head>
<body>
<div class="container align-content-center">
    <h1>Access denied</h1>
    <h2 th:text="'Authorities granted to '+${authorizedusername}+':'"></h2>
    <h3 th:text="${authorities}"></h3>
    <a aria-current="page" class="btn btn-outline-success" onclick="history.back()">Back</a>
    <a aria-current="page" class="btn btn-outline-info" href="/logout"
       th:text="'Logout ' + ${authorizedusername}"></a>
</div>

<script crossorigin="anonymous" th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
