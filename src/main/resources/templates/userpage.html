<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link crossorigin="anonymous" rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
    <title>KK User</title>
</head>
<body onload="timedRefresh(60000);">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <span class="navbar-brand unselectable fw-bold"
                  th:text="${user.getUserName() + ' ('+user.getRealmName()+')'}"></span>

            <div class="navbar-collapse"></div>

            <a aria-current="page" class="btn btn-outline-info" href="/logout"
               th:text="'Logout ' + ${authorizedusername}"/>

        </div>
    </nav>
    <form method="post">
        <div class="mb-2 row">
            <label class="col-sm-2 col-form-label fw-bold" for="userName">Username</label>
            <div class="col-sm-10">
                <input class="form-control-plaintext" id="userName" readonly
                       th:value="${user.getUserName()}"
                       type="text">
            </div>
        </div>
        <div class="mb-2 row">
            <label class="col-sm-2 col-form-label fw-bold" for="realmName">Realm</label>
            <div class="col-sm-10">
                <input class="form-control-plaintext" id="realmName" readonly
                       th:value="${user.getRealmName()}"
                       type="text">
            </div>
        </div>
        <div class="mb-2 row">
            <label class="col-sm-2 col-form-label fw-bold" for="userId">Id</label>
            <div class="col-sm-10">
                <input class="form-control-plaintext" id="userId" readonly
                       th:value="${user.getUserId()}"
                       type="text">
            </div>
        </div>
        <div class="mb-2 row">
            <label class="col-sm-2 col-form-label fw-bold" for="createdTime">User created</label>
            <div class="col-sm-10">
                <input class="form-control-plaintext" id="createdTime" readonly
                       th:value="${#dates.format(user.getCreated())}"
                       type="text">
            </div>
        </div>
        <div class="mb-2 row">
            <label class="col-sm-2 col-form-label fw-bold" for="lastLogin">Last logged in</label>
            <div class="col-sm-10">
                <input class="form-control-plaintext" id="lastLogin" readonly
                       th:value="${user.getLastLogin() != 0 ? #dates.format(user.getLastLogin()) : ''}"
                       type="text">
            </div>
        </div>
        <div class="mb-2 row">
            <label class="col-sm-2 col-form-label fw-bold" for="comment">Comment</label>
            <div class="col-sm-10">
                <input class="form-control-plaintext" id="comment" readonly
                       th:value="${user.getComment()}"
                       type="text">
            </div>
        </div>
        <div class="mb-2 row">
            <div class="text-center h1">

                <input class="form-check-input" id="enbl" name="enabled"
                       th:checked="${user.getEnabled()}"
                       type="checkbox">
                <label class="form-check-label" for="enbl">Enabled</label>

            </div>
        </div>
        <div class="mb-2 row">
            <div class="text-center">
                <button class="btn btn-outline-danger" type="submit">Save</button>
                <a aria-current="page" class="btn btn-outline-success" href="/">Back</a>
            </div>
        </div>
        <input name="_csrf" th:value="${_csrf.getToken()}" type="hidden">
    </form>
</div>
<script crossorigin="anonymous" th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
<script crossorigin="anonymous" th:src="@{/script/script.js}"></script>
</body>
</html>
